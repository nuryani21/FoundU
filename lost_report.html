<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>FoundU Report Lost Item</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Poppins',sans-serif;
    }
  </style>
</head>

<body class="bg-purple-50">

<div class="flex min-h-screen">

  <aside class="w-64 bg-white shadow-lg p-6">

  <div>
    <img src="image/logo.png" class="w-100 mb-10">
  </div>

  <nav class="space-y-4">

    <a href="dashboard.html"
       class="block hover:bg-purple-100 px-4 py-3 rounded-xl">
       Dashboard
    </a>

    <a href="lost_report.html"
       class="block bg-purple-500 text-white px-4 py-3 rounded-xl">
       Report Lost Item
    </a>

    <a href="found_items.html"
       class="block hover:bg-purple-100 px-4 py-3 rounded-xl">
       Found Items
    </a>

    <a href="my_reports.html"
       class="block hover:bg-purple-100 px-4 py-3 rounded-xl">
       My Reports
    </a>

    <a href="messages.html"
       class="block hover:bg-purple-100 px-4 py-3 rounded-xl">
       Messages
    </a>

    <a href="notifications.html"
       class="block hover:bg-purple-100 px-4 py-3 rounded-xl">
       Notifications
    </a>

  </nav>

</aside>

<main class="flex-1 p-10">

    <h2 class="text-4xl font-bold mb-8">
      Report Lost Item
    </h2>

    <div class="bg-white rounded-3xl shadow p-10">

      <form class="space-y-6">

        <div>
          <label class="block mb-2 font-medium">
            Item Name
          </label>

          <input
            type="text"
            placeholder="Example: Black Wallet"
            class="w-full border p-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400"
          >
        </div>

        <div>
          <label class="block mb-2 font-medium">
            Last Seen Location
          </label>

          <input
            type="text"
            placeholder="Example: Library"
            class="w-full border p-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400"
          >
        </div>

        <div>
          <label class="block mb-2 font-medium">
            Date Lost
          </label>

          <input
            type="date"
            class="w-full border p-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400"
          >
        </div>

        <div>
          <label class="block mb-2 font-medium">
            Item Description
          </label>

          <textarea
            rows="5"
            placeholder="Describe your item..."
            class="w-full border p-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400"
          ></textarea>
        </div>

        <div>
          <label class="block mb-2 font-medium">
            Upload Image
          </label>

          <input
            type="file"
            class="w-full border p-4 rounded-xl bg-white"
          >
        </div>

        <button
          type="submit"
          class="bg-purple-500 hover:bg-purple-600 text-white px-8 py-4 rounded-xl font-medium transition"
        >
          Submit Report
        </button>

      </form>

    </div>

  </main>

</div>

</body>
</html>

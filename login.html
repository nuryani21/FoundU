<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoundU Login</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>
<body class="bg-purple-50 min-h-screen flex items-center justify-center">

<div class="bg-white w-[900px] rounded-3xl shadow-2xl overflow-hidden grid grid-cols-2">

  <div class="bg-purple-100 p-10 flex flex-col justify-center">
    <img src="image/logo.png" class="w-100">
  </div>

  <div class="p-12">
    <h2 class="text-3xl font-semibold mb-8">Login</h2>

    <form id="login_form" class="space-y-5">

      <div>
        <label class="block mb-2 text-sm font-medium">Email</label>
        <input
          type="email"
          id="email"
          class="w-full border rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-purple-400"
          placeholder="student@gmail.com"
        >
      </div>

      <div>
        <label class="block mb-2 text-sm font-medium">Password</label>
        <input
          type="password"
          id="password"
          class="w-full border rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-purple-400"
          placeholder="********"
        >
      </div>

      <p id="error_message" class="text-red-500 text-sm hidden">
        Invalid email or password.
      </p>

      <button
        type="submit"
        class="w-full bg-purple-500 hover:bg-purple-600 text-white py-4 rounded-xl font-medium transition"
      >
        Login
      </button>

      <p class="text-center text-gray-500">
        No account?
        <a href="register.html" class="text-purple-500 font-medium">Register</a>
      </p>

    </form>
  </div>
</div>

<script>
const form = document.getElementById('login_form');

form.addEventListener('submit', function(e){
  e.preventDefault();

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  if(email === 'admin@foundu.com' && password === '123456'){
    window.location.href = 'dashboard.html';
  }
  else{
    document.getElementById('error_message').classList.remove('hidden');
  }
});
</script>

</body>
</html>

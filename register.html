<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoundU Register</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-purple-50 flex items-center justify-center min-h-screen">

<div class="bg-white w-[500px] p-10 rounded-3xl shadow-2xl">

  <h1 class="text-4xl font-bold mb-8 text-center">
    Create Account
  </h1>

  <form class="space-y-5">

    <input type="text" placeholder="Full Name" class="w-full border p-4 rounded-xl">

    <input type="email" placeholder="Email" class="w-full border p-4 rounded-xl">

    <input type="password" placeholder="Password" class="w-full border p-4 rounded-xl">

    <button class="w-full bg-purple-500 text-white py-4 rounded-xl">
      Register
    </button>

  </form>

</div>

</body>
</html>
